<div class="help-overlay search-overlay" *ngIf="show" (click)="close.emit()">
  <div class="help-content search-content" (click)="$event.stopPropagation()">
    <h2>Search Keywords</h2>
    <div class="search-input-wrapper">
      <input #searchInput [ngModel]="searchQuery" (ngModelChange)="onQueryChange($event)" placeholder="Type to search..." />
    </div>

    <div class="search-results scrollable" *ngIf="searchQuery.trim()">
      <ng-container *ngIf="(filteredNotes$ | async) as items">
        <div class="search-result-item" *ngFor="let note of items" (click)="selectResult.emit(note)"
          [class.selected]="selectedNoteId === note.id">
          <div class="search-info">
            <p class="search-preview" [innerHTML]="formatContent(note.content)"></p>
            <div class="pin-icon mini" *ngIf="note.is_pinned">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M16,12V4H17V2H7V4H8V12L6,14V16H11V22L12,23L13,22V16H18V14L16,12Z" />
              </svg>
            </div>
          </div>
          <span class="search-date">{{ formatDate(note.timestamp) }}</span>
        </div>
        <div class="empty-state" *ngIf="items.length === 0">
          No results found for "{{ searchQuery }}"
        </div>
      </ng-container>
    </div>
  </div>
</div>
