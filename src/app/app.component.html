<!-- Splash Screen -->
<app-splash [show]="showSplash" [fading]="splashFading"></app-splash>

<!-- Titlebar -->
<app-titlebar
  [authStatus]="authStatus"
  [isDarkMode]="isDarkMode"
  [spellCheckEnabled]="spellCheckEnabled"
  [autoStartEnabled]="autoStartEnabled"
  (toggleDarkMode)="toggleDarkMode()"
  (toggleFontSettings)="toggleFontSettings()"
  (toggleSpellCheck)="toggleSpellCheck()"
  (toggleAutoStart)="toggleAutoStart()"
  (toggleBin)="showBin = true"
  (toggleHelp)="showHelp = true">
</app-titlebar>

<!-- Vault Locked/Setup View -->
<app-vault
  *ngIf="authStatus !== 'Unlocked' && authStatus !== 'Checking'"
  [authStatus]="authStatus"
  [errorMessage]="errorMessage"
  [appVersion]="appVersion"
  (unlock)="unlockVault($event)">
</app-vault>

<!-- ========== TASKS SECTION ========== -->
<app-tasks
  *ngIf="authStatus === 'Unlocked' && activeSection === 'tasks'"
  [notes]="notes"
  [selectedNoteId]="selectedNoteId"
  [editingNoteId]="editingNoteId"
  [isConfirmingDeleteId]="isConfirmingDeleteId"
  [spellCheckEnabled]="spellCheckEnabled"
  (noteKeyDown)="handleNoteKeyDown($event)"
  (selectNoteAction)="selectNote($event.note, $event.event)"
  (editKeyDown)="handleEditKeyDown($event.event, $event.note)">
</app-tasks>

<!-- ========== NOTEPAD SECTION ========== -->
<app-notepad
  *ngIf="authStatus === 'Unlocked' && activeSection === 'notepad'"
  [pads]="pads"
  [activePad]="activePad"
  [activeTabId]="activeTabId"
  [openOrderedTabs]="openOrderedTabs"
  [draggedTabId]="draggedTabId"
  [dragEnterId]="dragEnterId"
  [lineNumbers]="lineNumbers"
  [padStats]="padStats"
  [padText]="padText"
  [selectedPadText]="selectedPadText"
  [spellCheckEnabled]="spellCheckEnabled"
  (switchTabAction)="switchTab($event)"
  (closeTabAction)="closeTab($event.id, $event.event)"
  (createPadAction)="createPad()"
  (tabDragStart)="onTabDragStart($event.event, $event.id)"
  (tabDragOver)="onTabDragOver($event)"
  (tabDragEnter)="onTabDragEnter($event.event, $event.id)"
  (tabDragLeave)="onTabDragLeave($event)"
  (tabDragEnd)="onTabDragEnd()"
  (tabDrop)="onTabDrop($event.event, $event.id)"
  (toggleLineMarkAction)="toggleLineMark($event)"
  (padInput)="onPadInput()"
  (padKeyDown)="handlePadKeyDown($event.event, $event.editor)"
  (editorScroll)="onEditorScroll($event)"
  (padSelect)="onPadSelect()"
  (padPaste)="handlePadPaste($event)"
  (toggleJSONAction)="toggleJSON()"
  (toggleBase64Action)="toggleBase64()">
</app-notepad>

<!-- Pad Close Confirmation Modal -->
<app-pad-close-modal
  [show]="isConfirmingPadCloseId !== null"
  (action)="handlePadCloseModalAction($event)">
</app-pad-close-modal>

<!-- Help Modal -->
<app-help
  [show]="showHelp"
  [appVersion]="appVersion"
  (close)="showHelp = false">
</app-help>

<!-- Search Modal -->
<app-search
  [show]="showSearch"
  [selectedNoteId]="selectedNoteId"
  (close)="showSearch = false"
  (selectResult)="selectSearchResult($event)">
</app-search>

<!-- Bin Modal (History) -->
<app-bin
  [show]="showBin"
  (close)="showBin = false"
  (itemRestored)="onBinItemRestored($event)">
</app-bin>

<!-- Font Settings Modal -->
<app-settings-modal
  [show]="showFontSettings"
  [availableFonts]="availableFonts"
  [selectedFont]="selectedFont"
  [focusedFontIndex]="focusedFontIndex"
  (close)="showFontSettings = false"
  (selectFont)="setFont($event); showFontSettings = false"
  (uploadFont)="uploadFont()"
  (deleteFont)="deleteCustomFont($event.name, $event.event)">
</app-settings-modal>
