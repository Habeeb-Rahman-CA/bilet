<div class="titlebar">
  <div class="window-controls">
    <button class="control close" (click)="close()"></button>
    <button class="control minimize" (click)="minimize()"></button>
    <button class="control maximize" (click)="maximize()"></button>
  </div>
  <div class="title-text">bilet</div>
  <div class="header-actions">
    <button class="lock-btn" *ngIf="authStatus === 'Unlocked'" (click)="lockVault()" title="Lock Vault Now">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
    </button>
    <button class="startup-toggle" [class.enabled]="autoStartEnabled" (click)="toggleAutoStart()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.71-2.13.09-2.91a2.18 2.18 0 0 0-3.09-.09z" />
        <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" />
        <path d="M9 12H4s.55-3.03 2-5c1.62-2.2 5-3 5-3" />
        <path d="M12 15v5s3.03-.55 5-2c2.2-1.62 3-5 3-5" />
      </svg>
      <span class="tooltip">{{ autoStartEnabled ? 'Startup: Enabled' : 'Startup: Disabled' }}</span>
    </button>
  </div>
</div>

<!-- Vault Locked/Setup View -->
<div class="vault-container" *ngIf="authStatus !== 'Unlocked'">
  <div class="vault-card">
    <div class="vault-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
    </div>

    <h2 *ngIf="authStatus === 'SetupRequired'">Security Setup</h2>
    <h2 *ngIf="authStatus === 'Locked'">Vault Locked</h2>

    <p class="vault-subtitle" *ngIf="authStatus === 'SetupRequired'">Set a master password to encrypt your notes.</p>
    <p class="vault-subtitle" *ngIf="authStatus === 'Locked'">Enter your password to decrypt your notes.</p>

    <div class="vault-input-group">
      <input type="password" [(ngModel)]="password" placeholder="Master Password" (keyup.enter)="unlockVault()"
        autofocus />
      <button class="primary" (click)="unlockVault()">
        {{ authStatus === 'SetupRequired' ? 'Create Vault' : 'Unlock' }}
      </button>
    </div>

    <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

    <p class="vault-footer" *ngIf="authStatus === 'SetupRequired'">Don't forget this password! We cannot recover it.</p>
  </div>
</div>

<!-- Main App Content (Unlocked) -->
<main class="container" *ngIf="authStatus === 'Unlocked'">
  <h2>My Notes</h2>

  <div class="input-group">
    <input [(ngModel)]="newNote" placeholder="Write a new note..." (keyup.enter)="addNote()" />
    <button class="primary" (click)="addNote()">Add</button>
  </div>

  <div class="notes-list">
    <div class="note-card" *ngFor="let note of notes">

      <!-- Normal View -->
      <div *ngIf="editingNoteId !== note.id; else editView">
        <p class="note-content">{{ note.content }}</p>
        <div class="card-actions">
          <button class="btn-link" (click)="startEdit(note)">Edit</button>
          <button class="btn-link" (click)="$event.stopPropagation(); deleteNote(note.id)">Delete</button>
        </div>
      </div>

      <!-- Edit View -->
      <ng-template #editView>
        <div class="edit-mode">
          <input [(ngModel)]="editContent" (keyup.enter)="updateNote()" autofocus />
          <div class="edit-actions">
            <button class="btn-link" (click)="updateNote()">Save Changes</button>
            <button class="btn-link" (click)="cancelEdit()">Cancel</button>
          </div>
        </div>
      </ng-template>

    </div>

    <div class="empty-state" *ngIf="notes.length === 0">
      <p>No notes found. Start by adding one above!</p>
    </div>
  </div>
</main>
